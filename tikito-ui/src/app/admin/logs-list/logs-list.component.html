<div class="main-side-column main-column">
  <button mat-button (click)="routeToAdmin();"><mat-icon>arrow_back</mat-icon> {{'admin/back-to-admin' | translatePipe}}</button>
</div>
<div class="main-center-column main-column">
  <mat-card>
    <mat-card-content>
      <div>
        <table mat-table [dataSource]="logs">
          <ng-container matColumnDef="timestamp">
            <th mat-header-cell *matHeaderCellDef>{{ 'admin/logs/timestamp' | translatePipe }}</th>
            <td mat-cell *matCellDef="let log"> {{ log.timestamp }}</td>
          </ng-container>

          <ng-container matColumnDef="objectIdentifier">
            <th mat-header-cell *matHeaderCellDef>{{ 'admin/logs/object-identifier' | translatePipe }}</th>
            <td mat-cell *matCellDef="let log"> {{ log.objectIdentifier }}</td>
          </ng-container>

          <ng-container matColumnDef="message">
            <th mat-header-cell *matHeaderCellDef>{{ 'admin/logs/message' | translatePipe }}</th>
            <td mat-cell *matCellDef="let log"> {{ log.message?.message }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let log">
              <button mat-icon-button color="warn" (click)="deleteLog(log.id)">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>
    </mat-card-content>
  </mat-card>
</div>
