<div class="main-side-column main-column"></div>

<div class="main-center-column-small main-column">
  @if (accounts.length == 0) {
    <div>
      <!--    {{'account/introduction-text' | translatePipePipe}}-->
    </div>
  }
  @if(accounts.length > 0) {
    <mat-card>
      <mat-card-content>
        <table mat-table [dataSource]="dataSource">

          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>{{'user-account/name' | translate}}</th>
            <td mat-cell *matCellDef="let element"> {{element.name}} </td>
          </ng-container>

          <ng-container matColumnDef="account-number">
            <th mat-header-cell *matHeaderCellDef>{{'user-account/account-number' | translate}}</th>
            <td mat-cell *matCellDef="let element"> {{element.accountNumber}} </td>
          </ng-container>

          <ng-container matColumnDef="currency">
            <th mat-header-cell *matHeaderCellDef>{{'currency' | translate}}</th>
            <td mat-cell *matCellDef="let element"> {{getCurrencyName(element)}} </td>
          </ng-container>

          <ng-container matColumnDef="options">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let element">
              <button mat-button [matMenuTriggerFor]="menu">
                <mat-icon>more_vert</mat-icon>
              </button>
              <mat-menu #menu="matMenu">
                <button mat-menu-item (click)="onDeleteAccount(element)">
                  <mat-icon>delete</mat-icon>
                  <span>{{ 'delete' | translate }}</span>
                </button>
              </mat-menu>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="onRowClicked(row, $event)" class="clickable"></tr>
        </table>

      </mat-card-content>
    </mat-card>
    <app-paginator></app-paginator>
  }
</div>
<div class="main-side-column main-column">
  <button mat-fab [attr.data-cy]="'add'" (click)="onAddAccountButtonClicked()" class="fab-button"><mat-icon>add</mat-icon></button>
</div>
