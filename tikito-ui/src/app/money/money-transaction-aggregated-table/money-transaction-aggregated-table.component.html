<mat-tab-group [selectedIndex]="selectedTabIndex" (selectedTabChange)="onTabChanged($event)">
  <mat-tab *ngFor="let tab of tabs" [label]="tab.label"></mat-tab>
</mat-tab-group>

<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>{{'name' | translate}}</th>
    <td mat-cell *matCellDef="let element">{{element.name}}</td>
  </ng-container>

  <ng-container matColumnDef="spent">
    <th mat-header-cell *matHeaderCellDef>{{'spent' | translate}}</th>
    <td mat-cell *matCellDef="let element" [style.color]="Util.currencyColor(element.spent)">{{Util.currencyFormat(element.spent)}}</td>
  </ng-container>

  <ng-container matColumnDef="budgeted">
    <th mat-header-cell *matHeaderCellDef>{{'budgeted' | translate}}</th>
    <td mat-cell *matCellDef="let element" [style.color]="Util.currencyColor(element.budgeted)">{{Util.currencyFormat(element.budgeted)}}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<app-paginator></app-paginator>
