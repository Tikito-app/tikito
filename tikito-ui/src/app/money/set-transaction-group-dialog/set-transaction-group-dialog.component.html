<h1 mat-dialog-title>{{'money/transaction/set-transaction-group' | translatePipe}}</h1>
<div mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field class="full-width">
      <mat-label>{{'money/group' | translatePipe}}</mat-label>
      <mat-select [attr.data-cy]="'group'" formControlName="group">
        @for (group of groups; track groups) {
          <mat-option [value]="group">{{group.name}}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </form>
</div>
<div mat-dialog-actions>
  <button [attr.data-cy]="'save-button'"  mat-raised-button color="primary" (click)="onSave();">{{'save' | translatePipe}}</button>&nbsp;
  <button [attr.data-cy]="'cancel-button'"  mat-raised-button color="secondary" (click)="onCancel()">{{'cancel' | translatePipe}}</button>
</div>
